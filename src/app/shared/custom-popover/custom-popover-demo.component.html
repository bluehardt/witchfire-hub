<button #popoverBtn (click)="showPopover()" style="margin: 2rem">
  Show Custom Popover
</button>
<app-custom-popover [anchor]="popoverBtn" #popoverRef>
  <div style="font-weight: bold; margin-bottom: 0.5rem">
    Custom Popover Content
  </div>
  <div>This is a test of the custom popover component.</div>
  <button (click)="popoverRef.hide()" style="margin-top: 1rem">Close</button>
</app-custom-popover>

<button
  #hoverPopoverBtn
  (mouseenter)="showHoverPopover()"
  (mouseleave)="hideHoverPopover()"
  style="margin: 2rem"
>
  Show on Hover
</button>
<app-custom-popover [anchor]="hoverPopoverBtn" #hoverPopoverRef>
  <div style="font-weight: bold; margin-bottom: 0.5rem">Popover on Hover</div>
  <div>This popover appears when you hover the button.</div>
</app-custom-popover>
